<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>文娱榜单</title>
  <meta name="description" content="微博、抖音、百度、B站、豆瓣文娱榜单，每小时自动更新，按平台展示原始榜单。" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <div>
        <p class="eyebrow">ENTERTAINMENT RANK</p >
        <h1>文娱榜单</h1>
        <p class="subtitle">按微博、抖音、百度、B站、豆瓣五个平台大类展示；每个平台内保留你指定的原始榜单，不做综合榜、综合分或跨榜单排序。</p >
      </div>
      <div class="status-card">
        <span class="status-label">更新时间</span>
        <strong id="updatedAt">加载中</strong>
        <span id="sourceStatus">正在读取数据</span>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="toolbar" aria-label="平台切换">
      <div class="tabs" id="tabs"></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <h2 id="platformTitle">微博</h2>
          <p id="platformHint">按该平台下的原始榜单分别展示。</p >
        </div>
        <a class="ghost-link" href=" " target="_blank" rel="noreferrer">查看 JSON 数据</a >
      </div>

      <div id="boardList" class="board-list" aria-live="polite"></div>
      <div id="emptyState" class="empty-state" hidden>暂无数据。可能是来源抓取失败，稍后会自动重试。</div>
    </section>
  </main>

  <footer class="footer">
    <p>数据来源：用户指定的 TopHub 节点。页面由 GitHub Actions 每小时自动更新。</p >
  </footer>

  <script src="./app.js" type="module"></script>
</body>
</html>
